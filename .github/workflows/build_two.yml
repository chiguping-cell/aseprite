name: Build Aseprite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest] # 只编译Windows版，更快更稳

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: Setup dependencies (Windows)
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install CMake, Ninja
      if: matrix.os == 'windows-latest'
      run: |
        choco install cmake ninja -y

    - name: Download Skia
      run: |
        curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/Skia-17e5e6b/Skia-Windows-Release-x64.zip
        unzip skia.zip -d skia

    - name: Configure build
      run: |
        mkdir build
        cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DLAF_BACKEND=skia -DSKIA_DIR=../skia -DSKIA_LIBRARY_DIR=../skia/out/Release-x64

    - name: Build Aseprite
      run: |
        cd build
        ninja aseprite

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Aseprite-Windows
        path: build/bin/
