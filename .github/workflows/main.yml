name: Build Aseprite

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    # Windows 编译
    - name: Build on Windows
      if: matrix.os == 'windows-latest'
      uses: aseprite/github-actions@main
      with:
        platform: Windows
        skia-version: '2.7.1'

    # Linux 编译
    - name: Build on Linux
      if: matrix.os == 'ubuntu-latest'
      uses: aseprite/github-actions@main
      with:
        platform: Linux
        skia-version: '2.7.1'

    # macOS 编译
    - name: Build on macOS
      if: matrix.os == 'macos-latest'
      uses: aseprite/github-actions@main
      with:
        platform: macOS
        skia-version: '2.7.1'

    # 上传成品
    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: Aseprite-${{ matrix.os }}
        path: build/bin/
